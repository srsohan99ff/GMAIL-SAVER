<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Username & Password Generator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2f2f7;          
            --card: #ffffff;        
            --border: #e5e5ea;      
            --text-dark: #1c1c1e;   
            --text-muted: #8e8e93;  
            --success: #34c759;     
            --danger: #ff3b30;
            --primary: #007aff;     
            --font: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body { 
            background-color: var(--bg); 
            padding: 16px; 
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            max-width: 400px;
            animation: pageFade 0.3s ease-out;
        }

        @keyframes pageFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .brand-header {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 16px; 
            margin-top: 5px;
        }
        h1.brand-title { 
            font-size: 23px; 
            font-weight: 700; 
            color: #000000; 
            letter-spacing: -0.3px;
        }

        .section-label { 
            font-size: 13px; 
            font-weight: 500; 
            color: var(--text-muted); 
            text-align: left; 
            margin-bottom: 4px; 
            padding-left: 2px; 
        }
        
        /* ইনপুটカード - স্থায়ী সবুজ বর্ডার */
        .input-card {
            width: 100%; 
            background: var(--card); 
            border: 1px solid var(--success); 
            border-radius: 10px;
            position: relative; 
            display: flex; 
            align-items: center; 
            margin-bottom: 12px; 
            box-shadow: 0 1px 4px rgba(52, 199, 89, 0.02);
        }

        .field-input { 
            width: 100%; 
            padding: 12px 14px; 
            border: none; 
            outline: none; 
            font-size: 14px; 
            font-weight: 500; 
            color: #1c1c1e; 
            background: transparent; 
        }

        /* কপি বাটন */
        .inline-copy-btn {
            width: 30px; 
            height: 30px; 
            border-radius: 50%; 
            border: 1px solid var(--border);
            background: #ffffff; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer; 
            transition: all 0.15s ease; 
            flex-shrink: 0;
            margin-right: 10px; 
        }
        .inline-copy-btn svg { width: 12px; height: 12px; fill: #b5b5b9; }
        .inline-copy-btn:active { transform: scale(0.92); background: #f2f2f7; }
        .inline-copy-btn.copied { background: var(--success) !important; border-color: var(--success) !important; }
        .inline-copy-btn.copied svg { fill: #fff !important; }

        /* চেঞ্জ বাটন কনফিগারেশন */
        .proceed-btn {
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            font-size: 15px; 
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.2s ease; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 8px; 
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.12);
            margin-top: 6px;
            min-height: 49px; 
        }
        .proceed-btn:active { transform: scale(0.98); opacity: 0.95; }
        .proceed-btn:disabled { background: #a2caff !important; cursor: not-allowed; box-shadow: none; }

        /* বাটন আইকন ও স্পিনার স্টাইল */
        .btn-icon { width: 16px; height: 16px; fill: #ffffff; display: block; }
        .btn-spinner { display: none; width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.55s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* টোস্ট নোটিফিকেশন */
        #topNotification {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff; 
            padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); z-index: 10000; 
            transition: top 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            display: flex; align-items: center; gap: 8px; white-space: nowrap; pointer-events: none;
        }
        #topNotification.show { top: 16px; }
        .toast-check { width: 16px; height: 16px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; color: #fff; }
        .toast-check svg { width: 10px; height: 10px; stroke: #fff; fill: none; stroke-width: 3; }
    </style>
</head>
<body>

    <div id="topNotification">
        <div class="toast-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        Copied Successfully!
    </div>

<div class="wrapper">
    
    <div class="brand-header">
        <h1 class="brand-title">Account Credentials</h1>
    </div>

    <div class="section-label">Username</div>
    <div class="input-card">
        <input type="text" id="usernameInput" class="field-input" readonly value="">
        <button class="inline-copy-btn" id="copyUsername" onclick="copyData('usernameInput', 'copyUsername')">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
    </div>

    <div class="section-label">Email Address</div>
    <div class="input-card">
        <input type="text" id="gmailInput" class="field-input" readonly value="">
        <button class="inline-copy-btn" id="copyGmail" onclick="copyData('gmailInput', 'copyGmail')">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
    </div>

    <div class="section-label">Password</div>
    <div class="input-card">
        <input type="text" id="passwordInput" class="field-input" readonly value="">
        <button class="inline-copy-btn" id="copyPassword" onclick="copyData('passwordInput', 'copyPassword')">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
    </div>

    <button id="changeBtn" class="proceed-btn" onclick="handleChangeProcess()">
        <div id="btnSpinner" class="btn-spinner"></div>
        <svg id="btnIcon" class="btn-icon" viewBox="0 0 24 24">
            <path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/>
        </svg>
        <span id="btnText">Change</span>
    </button>

</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // ইউজারনেম এবং পাসওয়ার্ড মেকার ইঞ্জিন
    function generateNewCredentials() {
        const lettersChars = "abcdefghijklmnopqrstuvwxyz";
        const numbersChars = "0123456789";
        
        let letterLength = Math.floor(Math.random() * (10 - 8 + 1)) + 8; 
        let numberLength = Math.floor(Math.random() * (4 - 2 + 1)) + 2;  
        
        let generatedUsername = "";
        for (let i = 0; i < letterLength; i++) {
            generatedUsername += lettersChars.charAt(Math.floor(Math.random() * lettersChars.length));
        }
        for (let i = 0; i < numberLength; i++) {
            generatedUsername += numbersChars.charAt(Math.floor(Math.random() * numbersChars.length));
        }
        let generatedGmail = generatedUsername + "@gmail.com";
        
        const upperChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const lowerChars = "abcdefghijklmnopqrstuvwxyz";
        const mixedPool = upperChars + lowerChars + numbersChars;
        
        // 👑 পাসওয়ার্ড সবসময় ঠিক ৮ অক্ষরের হবে
        let generatedPassword = upperChars.charAt(Math.floor(Math.random() * upperChars.length)); // ১ম অক্ষর বড় হাতের
        
        let totalPassLength = 8; // ফিক্সড ৮ ক্যারেক্টার
        for (let i = 1; i < totalPassLength; i++) {
            generatedPassword += mixedPool.charAt(Math.floor(Math.random() * mixedPool.length));
        }

        document.getElementById('usernameInput').value = generatedUsername;
        document.getElementById('gmailInput').value = generatedGmail;
        document.getElementById('passwordInput').value = generatedPassword;
    }

    // বাটন ক্লিক প্রসেস (অনলি ২ সেকেন্ড স্পিনার ঘুরবে)
    function handleChangeProcess() {
        const btn = document.getElementById('changeBtn');
        const spinner = document.getElementById('btnSpinner');
        const icon = document.getElementById('btnIcon');
        const text = document.getElementById('btnText');

        btn.setAttribute('disabled', 'true');
        spinner.style.display = 'block';
        icon.style.display = 'none';
        text.style.display = 'none'; 

        setTimeout(() => {
            generateNewCredentials();

            btn.removeAttribute('disabled');
            spinner.style.display = 'none';
            icon.style.display = 'block';
            text.style.display = 'block';
        }, 2000);
    }

    // কপি মেকানিজম
    function copyData(inputId, btnId) {
        const inputEl = document.getElementById(inputId);
        if(!inputEl.value) return;

        navigator.clipboard.writeText(inputEl.value).then(() => {
            const btn = document.getElementById(btnId);
            const icon = btn.querySelector('svg');
            const notif = document.getElementById('topNotification');
            
            btn.classList.add('copied');
            icon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#ffffff"/>';
            notif.classList.add('show');
            
            setTimeout(function() {
                notif.classList.remove('show'); 
                btn.classList.remove('copied');
                icon.innerHTML = '<path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>';
            }, 1800);
        });
    }

    window.onload = generateNewCredentials;
</script>
</body>
</html>

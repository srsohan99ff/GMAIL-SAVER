<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Username & Password Generator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2f2f7;          
            --card: #ffffff;        
            --border: #e5e5ea;      
            --text-dark: #1c1c1e;   
            --text-muted: #8e8e93;  
            --success: #34c759;     
            --danger: #ff3b30;
            --primary: #007aff;     
            --font: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body { 
            background-color: var(--bg); 
            padding: 16px; 
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            max-width: 400px;
            animation: pageFade 0.3s ease-out;
        }

        @keyframes pageFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .brand-header {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 24px;
            margin-top: 10px;
        }
        h1.brand-title { 
            font-size: 24px; 
            font-weight: 700; 
            color: #000000; 
            letter-spacing: -0.3px;
        }

        .section-label { 
            font-size: 13px; 
            font-weight: 500; 
            color: var(--text-muted); 
            text-align: left; 
            margin-bottom: 8px; 
            padding-left: 2px; 
        }
        
        /* 👑 ইনপুট কার্ড যা সবসময় ভ্যালিড (সবুজ) থাকবে */
        .input-card {
            width: 100%; 
            background: var(--card); 
            border: 1px solid var(--success); /* স্থায়ী সবুজ বর্ডার */
            border-radius: 12px;
            position: relative; 
            display: flex; 
            align-items: center; 
            margin-bottom: 20px; 
            box-shadow: 0 2px 8px rgba(52, 199, 89, 0.03);
        }

        .field-input { 
            width: 100%; 
            padding: 15px 14px; 
            border: none; 
            outline: none; 
            font-size: 14.5px; 
            font-weight: 500; 
            color: #1c1c1e; 
            background: transparent; 
        }

        .status-icon-wrap { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding-right: 10px; 
            height: 100%; 
            flex-shrink: 0; 
        }
        .status-icon-wrap svg { 
            width: 20px; 
            height: 20px; 
            fill: var(--success); 
        }

        /* 👑 কপি বাটন কনফিগারেশন */
        .inline-copy-btn {
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            border: 1px solid var(--border);
            background: #ffffff; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer; 
            transition: all 0.15s ease; 
            flex-shrink: 0;
            margin-right: 8px;
        }
        .inline-copy-btn svg { width: 13px; height: 13px; fill: #b5b5b9; }
        .inline-copy-btn:active { transform: scale(0.92); background: #f2f2f7; }
        .inline-copy-btn.copied { background: var(--success) !important; border-color: var(--success) !important; }
        .inline-copy-btn.copied svg { fill: #fff !important; }

        /* 👑 নিচে চেঞ্জ করার মেইন বাটন */
        .proceed-btn {
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.2s ease; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.15);
            margin-top: 10px;
        }
        .proceed-btn:active { transform: scale(0.98); opacity: 0.95; }

        /* টোস্ট নোটিফিকেশন */
        #topNotification {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff; 
            padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); z-index: 10000; 
            transition: top 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            display: flex; align-items: center; gap: 8px; white-space: nowrap; pointer-events: none;
        }
        #topNotification.show { top: 16px; }
        .toast-check { width: 16px; height: 16px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; color: #fff; }
        .toast-check svg { width: 10px; height: 10px; stroke: #fff; fill: none; stroke-width: 3; }
    </style>
</head>
<body>

    <!-- টোস্ট অ্যালার্ট -->
    <div id="topNotification">
        <div class="toast-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        Copied Successfully!
    </div>

<div class="wrapper">
    
    <div class="brand-header">
        <h1 class="brand-title">Account Credentials</h1>
    </div>

    <!-- ১. ইউজারনেম বক্স -->
    <div class="section-label">Username</div>
    <div class="input-card">
        <input type="text" id="usernameInput" class="field-input" readonly value="">
        
        <button class="inline-copy-btn" id="copyUsername" onclick="copyData('usernameInput', 'copyUsername')">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>

        <div class="status-icon-wrap">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
    </div>

    <!-- ২. ফুল জিমেইল বক্স -->
    <div class="section-label">Gmail Address</div>
    <div class="input-card">
        <input type="text" id="gmailInput" class="field-input" readonly value="">
        
        <button class="inline-copy-btn" id="copyGmail" onclick="copyData('gmailInput', 'copyGmail')">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>

        <div class="status-icon-wrap">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
    </div>

    <!-- ৩. পাসওয়ার্ড বক্স -->
    <div class="section-label">Password</div>
    <div class="input-card">
        <input type="text" id="passwordInput" class="field-input" readonly value="">
        
        <button class="inline-copy-btn" id="copyPassword" onclick="copyData('passwordInput', 'copyPassword')">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>

        <div class="status-icon-wrap">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
    </div>

    <!-- 👑 ডেটা চেঞ্জ করার মূল বাটন -->
    <button id="changeBtn" class="proceed-btn" onclick="generateNewCredentials()">
        <span>Change Data</span>
    </button>

</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // 👑 র্যান্ডম ইউজারনেম এবং পাসওয়ার্ড জেনারেটর ইঞ্জিন
    function generateNewCredentials() {
        const prefixes = ["sohan", "bot", "cyber", "alpha", "secure", "luna", "shadow", "pro", "master", "delta"];
        const suffixes = ["gaming", "king", "offic", "v99", "ff", "saver", "prime", "hub", "dx", "zone"];
        
        // র্যান্ডম ইউজারনেম জেনারেশন
        let randPrefix = prefixes[Math.floor(Math.random() * prefixes.length)];
        let randSuffix = suffixes[Math.floor(Math.random() * suffixes.length)];
        let randNum = Math.floor(100 + Math.random() * 900); // ৩ ডিজিটের র্যান্ডম নম্বর
        
        let generatedUsername = `${randPrefix}_${randSuffix}${randNum}`;
        let generatedGmail = `${generatedUsername}@gmail.com`;
        
        // র্যান্ডম স্ট্রং পাসওয়ার্ড জেনারেশন
        let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$&";
        let generatedPassword = "";
        for (let i = 0; i < 10; i++) {
            generatedPassword += chars.charAt(Math.floor(Math.random() * chars.length));
        }

        // বক্সে ডাটা সেট করা
        document.getElementById('usernameInput').value = generatedUsername;
        document.getElementById('gmailInput').value = generatedGmail;
        document.getElementById('passwordInput').value = generatedPassword;
    }

    // 👑 কপি ফাংশনালিটি
    function copyData(inputId, btnId) {
        const inputEl = document.getElementById(inputId);
        if(!inputEl.value) return;

        navigator.clipboard.writeText(inputEl.value).then(() => {
            const btn = document.getElementById(btnId);
            const icon = btn.querySelector('svg');
            const notif = document.getElementById('topNotification');
            
            btn.classList.add('copied');
            icon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#ffffff"/>';
            notif.classList.add('show');
            
            setTimeout(function() {
                notif.classList.remove('show'); 
                btn.classList.remove('copied');
                icon.innerHTML = '<path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>';
            }, 1800);
        });
    }

    // পেজ লোড হওয়ার সাথে সাথেই প্রথমবার ডেটা অটো-জেনারেট হবে
    window.onload = generateNewCredentials;
</script>
</body>
</html>

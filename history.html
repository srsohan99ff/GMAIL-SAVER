<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GMAIL SAVER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsSHA/2.4.2/sha.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f2f2f7;          
            --card: #ffffff;        
            --border: #e5e5ea;      
            --text: #000000;        
            --muted: #8e8e93;       
            --success: #34c759;     
            --danger: #ff3b30;    
            --primary: #007aff;     
            --font: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body { 
            background-color: var(--bg); 
            padding: 20px 14px; 
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .page-title {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        /* 🔍 প্রিমিয়াম জিমেইল সার্চ বক্স স্টাইল */
        .search-wrapper {
            display: flex;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            align-items: center;
        }
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            background: transparent;
            user-select: text;
        }
        .search-input::placeholder { color: var(--muted); }
        
        /* ⚡ ছোট করা সার্চ বাটন ও স্পিনার */
        .search-btn {
            background: var(--primary);
            color: #ffffff;
            border: none;
            outline: none;
            height: 32px;
            padding: 0 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 68px;
        }
        .search-btn:active { opacity: 0.8; }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 👑 উপর থেকে নেমে আসা প্রিমিয়াম iOS নোটিফিকেশন */
        #topNotification {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff; 
            padding: 10px 22px; border-radius: 50px; font-size: 13px; font-weight: 600;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2); z-index: 10000; 
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            display: flex; align-items: center; gap: 10px; white-space: nowrap; pointer-events: none;
        }
        #topNotification.show { top: 20px; }
        .toast-check { width: 18px; height: 18px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; color: #fff; }
        .toast-check svg { width: 11px; height: 11px; stroke: #fff; fill: none; stroke-width: 3; }

        /* 👑 প্রিমিয়াম হোয়াইট কার্ড স্টাইল */
        .card { 
            background: var(--card); border-radius: 14px; overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.03); box-shadow: 0 2px 6px rgba(0,0,0,0.02); 
            margin-bottom: 16px; padding-top: 4px;
        }
        
        .summary-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 14px; border-bottom: 1px solid #f2f2f7; gap: 10px;
        }
        
        .row-label { font-size: 13px; color: #48484a; font-weight: 700; white-space: nowrap; }
        .row-value-copy { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text); justify-content: flex-end; max-width: 75%; }
        .value-text { font-family: monospace; color: var(--text); word-break: break-all; text-align: right; user-select: text; }

        /* 👑 কাস্টম কপি বাটন */
        .inline-copy-btn {
            width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
            background: #ffffff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease; flex-shrink: 0;
        }
        .inline-copy-btn svg { width: 12px; height: 12px; fill: var(--muted); }
        .inline-copy-btn:active { transform: scale(0.88); background: #f2f2f7; }
        .inline-copy-btn.copied { background: var(--success) !important; border-color: var(--success) !important; }
        .inline-copy-btn.copied svg { fill: #fff !important; }

        /* 🛠️ কার্ডের নিচের অ্যাকশন বাটন প্যানেল (iOS Style) */
        .card-actions {
            display: flex; justify-content: flex-end; gap: 6px;
            padding: 10px 14px; background: rgba(0,0,0,0.005);
            border-top: 1px solid #f2f2f7;
        }
        .action-btn {
            border: none; background: none; font-size: 13px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 4px;
            padding: 6px 10px; border-radius: 8px; transition: background 0.2s;
        }
        .action-btn.edit { color: var(--primary); }
        .action-btn.edit:active { background: rgba(0, 122, 255, 0.08); }
        .action-btn.edit svg { width: 13px; height: 13px; fill: var(--primary); }
        
        .action-btn.delete { color: var(--danger); }
        .action-btn.delete:active { background: rgba(255, 59, 48, 0.08); }
        .action-btn.delete svg { width: 13px; height: 13px; fill: var(--danger); }
        
        .message-box { text-align: center; color: var(--muted); font-weight: 600; padding: 60px 20px; font-size: 15px; }

        /* 👑 অ্যাকাউন্ট কাউন্টার স্টাইল */
        .counter-container {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; color: var(--muted); font-weight: 600; margin-bottom: 16px; padding: 0 4px;
        }
        .counter-value {
            color: var(--primary); font-weight: 700; background: rgba(0, 122, 255, 0.1);
            padding: 3px 10px; border-radius: 20px; font-size: 13px;
        }

        /* 🔑 ২এফএ ডাইনামিক লাইভ টেক্সট কন্টেন্ট */
        .otp-display { font-family: monospace; color: var(--primary); font-weight: 800; font-size: 17px; letter-spacing: 0.5px; }
        .otp-controls-hub { display: flex; align-items: center; gap: 8px; }
        
        /* ⏱️ সার্কেল টাইমার */
        .authenticator-timer-box {
            display: flex; align-items: center; justify-content: center; position: relative; width: 24px; height: 24px; flex-shrink: 0;
        }
        .authenticator-timer-box svg { transform: rotate(-90deg); width: 24px; height: 24px; }
        .authenticator-timer-box circle { fill: none; stroke-width: 2.5; }
        .authenticator-timer-box .bg-ring { stroke: #e5e5ea; }
        .authenticator-timer-box .progress-ring {
            stroke: var(--primary); stroke-dasharray: 62.8; stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
        }
        .timer-text-sec { position: absolute; font-size: 8px; font-weight: 700; color: var(--primary); font-family: sans-serif; }

        /* 📱 ১০০% খাঁটি আইফোন স্টাইল পপআপ মডাল (iOS Alert UI) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); z-index: 20000;
            display: none; align-items: center; justify-content: center;
            padding: 20px;
        }
        .ios-alert-box {
            background: rgba(255, 255, 255, 0.9); width: 100%; max-width: 285px;
            border-radius: 14px; display: flex; flex-direction: column;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); overflow: hidden;
            animation: iosPop 0.25s cubic-bezier(0.1, 0.8, 0.25, 1);
        }
        @keyframes iosPop {
            from { transform: scale(1.15); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .ios-alert-body { padding: 18px 16px; text-align: center; }
        .ios-alert-title { font-size: 17px; font-weight: 600; color: #000000; margin-bottom: 4px; }
        .ios-alert-subtitle { font-size: 12px; color: var(--muted); word-break: break-all; margin-bottom: 14px; font-weight: 500; }
        
        .ios-input-group { text-align: left; margin-bottom: 10px; }
        .ios-input-group label { font-size: 11px; font-weight: 600; color: #48484a; margin-left: 2px; display: block; margin-bottom: 3px; }
        .ios-input-group input {
            width: 100%; border: 1px solid #c6c6c8; background: #ffffff;
            padding: 6px 8px; font-size: 13px; border-radius: 6px; outline: none;
            color: #000000; user-select: text !important; -webkit-user-select: text !important;
        }
        
        .ios-alert-buttons { display: flex; border-top: 0.5px solid #c8c8c8; }
        .ios-alert-btn {
            flex: 1; background: none; border: none; outline: none; padding: 12px;
            font-size: 16px; color: var(--primary); cursor: pointer; text-align: center;
        }
        .ios-alert-btn.cancel { border-right: 0.5px solid #c8c8c8; font-weight: 400; }
        .ios-alert-btn.save { font-weight: 600; }
        .ios-alert-btn:active { background: rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="topNotification">
        <div class="toast-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span id="notificationText">Copied Successfully!</span>
    </div>

    <div id="iosModalOverlay" class="modal-overlay">
        <div class="ios-alert-box">
            <div class="ios-alert-body">
                <div class="ios-alert-title">Edit Account</div>
                <div class="ios-alert-subtitle" id="modalTargetEmail">email@gmail.com</div>
                
                <div class="ios-input-group">
                    <label>Recovery Mail</label>
                    <input type="text" id="modalRecoveryInput" placeholder="Enter recovery email">
                </div>
                
                <div class="ios-input-group">
                    <label>2FA Secret Key</label>
                    <input type="text" id="modal2faInput" placeholder="Enter 2FA secret">
                </div>
            </div>
            <div class="ios-alert-buttons">
                <button class="ios-alert-btn cancel" onclick="closeEditModal()">Cancel</button>
                <button class="ios-alert-btn save" onclick="saveAccountEdits()">Save</button>
            </div>
        </div>
    </div>

    <h2 class="page-title">GMAIL SAVER</h2>

    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="Enter exact Gmail to search..." onkeydown="if(event.key === 'Enter') handleGmailSearch()">
        <button class="search-btn" onclick="handleGmailSearch()">Search</button>
    </div>

    <div class="counter-container">
        <span>Accounts Found:</span>
        <span id="totalCount" class="counter-value">0</span>
    </div>

    <div id="historyBox" class="message-box">Loading accounts...</div>

    <script>
        let allOrdersGlobal = [];
        let live2FAEngineTimer = null;
        let currentEditingEmail = null;

        // ২এফএ ডিকোড লজিক
        function dec2hex(s) { return (s < 15.5 ? '0' : '') + Math.round(s).toString(16); }
        function hex2dec(s) { return parseInt(s, 16); }
        function base32tohex(base32) {
            let base32chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
            let bits = ""; let hex = "";
            for (let i = 0; i < base32.length; i++) {
                let val = base32chars.indexOf(base32.charAt(i).toUpperCase());
                if(val === -1) continue;
                bits += leftpad(val.toString(2), 5, '0');
            }
            for (let i = 0; i + 4 <= bits.length; i += 4) {
                let chunk = bits.substr(i, 4);
                hex = hex + parseInt(chunk, 2).toString(16);
            }
            return hex;
        }
        function leftpad(str, len, pad) { if (len + 1 >= str.length) { str = Array(len + 1 - str.length).join(pad) + str; } return str; }

        // TOTP ওটিপি জেনারেটর
        function getLocalTOTP(secret) {
            try {
                if(!secret || secret.trim() === "") return "------";
                let key = base32tohex(secret.toUpperCase().replace(/\s+/g, ""));
                let epoch = Math.round(new Date().getTime() / 1000.0);
                let time = leftpad(dec2hex(Math.floor(epoch / 30)), 16, '0');
                
                let shaObj = new jsSHA("SHA-1", "HEX");
                shaObj.setHMACKey(key, "HEX");
                shaObj.update(time);
                let hmac = shaObj.getHMAC("HEX");
                
                let offset = hex2dec(hmac.substring(hmac.length - 1));
                let otp = (hex2dec(hmac.substr(offset * 2, 8)) & hex2dec('7fffffff')) + '';
                otp = otp.substr(otp.length - 6, 6);
                return leftpad(otp, 6, '0');
            } catch (err) {
                return "000000";
            }
        }

        // নোটিফিকেশন টোস্ট ট্রিগার
        function triggerNotification(message, statusType = 'success') {
            const notif = document.getElementById('topNotification');
            const checkContainer = notif.querySelector('.toast-check');
            document.getElementById('notificationText').innerText = message;

            if(statusType === 'danger') {
                checkContainer.style.background = "var(--danger)";
                checkContainer.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
            } else {
                checkContainer.style.background = "var(--success)";
                checkContainer.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
            }

            notif.classList.add('show');
            setTimeout(() => { notif.classList.remove('show'); }, 2200);
        }

        // কপি লজিক
        function copyOrder(text, btnId) {
            if(!text || text.includes("---") || text.includes("Calculat")) return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById(btnId);
                const icon = btn.querySelector('svg');
                
                btn.classList.add('copied');
                icon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#ffffff"/>';
                triggerNotification("Copied Successfully!", 'success');
                
                setTimeout(function() {
                    btn.classList.remove('copied');
                    icon.innerHTML = '<path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="#8e8e93"/>';
                }, 2200);
            });
        }

        // ⏱️ লাইভ ৩০ সেকেন্ড টাইমার ইঞ্জিন
        function startLive2FAEngine() {
            if(live2FAEngineTimer) clearInterval(live2FAEngineTimer);
            const totalRadius = 10;
            const circumference = 2 * Math.PI * totalRadius; 

            function updateLoop() {
                const now = new Date();
                const remainingTime = 30 - (now.getSeconds() % 30);

                document.querySelectorAll('.card').forEach((card) => {
                    const secret = card.getAttribute('data-tfa-secret');
                    const otpSpan = card.querySelector('.otp-display');
                    const ring = card.querySelector('.progress-ring');
                    const textSec = card.querySelector('.timer-text-sec');
                    const copyBtn = card.querySelector('.tfa-live-copy-btn');

                    if (!secret || secret.trim() === "" || secret.toLowerCase() === "n/a") return;

                    const currentLiveCode = getLocalTOTP(secret);
                    if(otpSpan) otpSpan.innerText = currentLiveCode;
                    if(copyBtn) copyBtn.setAttribute('onclick', `copyOrder('${currentLiveCode}', '${copyBtn.id}')`);
                    if(textSec) textSec.innerText = remainingTime;
                    
                    if(ring && textSec) {
                        if(remainingTime <= 5) {
                            ring.style.stroke = "var(--danger)";
                            textSec.style.color = "var(--danger)";
                        } else {
                            ring.style.stroke = "var(--primary)";
                            textSec.style.color = "var(--primary)";
                        }
                        ring.style.strokeDashoffset = circumference - (remainingTime / 30) * circumference;
                    }
                });
            }
            updateLoop();
            live2FAEngineTimer = setInterval(updateLoop, 1000);
        }

        // 🎯 জিমেইল সার্চ হ্যান্ডলার (স্পিনার অ্যানিমেশন সহ)
        function handleGmailSearch() {
            const searchBtn = document.querySelector('.search-btn');
            const originalText = searchBtn.innerText;
            
            // স্পিনার লোডিং অন করা
            searchBtn.innerHTML = '<div class="spinner"></div>';
            searchBtn.disabled = true;

            setTimeout(() => {
                const query = document.getElementById('searchInput').value.trim().toLowerCase();
                if (query === "") {
                    renderOrders(allOrdersGlobal);
                } else {
                    const filtered = allOrdersGlobal.filter(item => {
                        let emailVal = (item.email || item.gmail || '').trim().toLowerCase();
                        return emailVal === query; 
                    });
                    renderOrders(filtered);
                }
                // লোডিং শেষ করে বাটন স্বাভাবিক করা
                searchBtn.innerHTML = originalText;
                searchBtn.disabled = false;
            }, 400); // 400ms ইন্টারঅ্যাক্টিভ আইফোন লোডিং লেটেন্সি
        }

        // 📱 আইফোন এডিট পপআপ ওপেন লজিক
        function openEditModal(targetEmail) {
            const account = allOrdersGlobal.find(item => {
                let currentMail = (item.email || item.gmail || '').trim().toLowerCase();
                return currentMail === targetEmail.trim().toLowerCase();
            });

            if (!account) return;

            currentEditingEmail = targetEmail;
            document.getElementById('modalTargetEmail').innerText = targetEmail;
            document.getElementById('modalRecoveryInput').value = account.recovery || '';
            document.getElementById('modal2faInput').value = account['2fa'] || '';
            
            document.getElementById('iosModalOverlay').style.display = 'flex';
        }

        // মডাল ক্লোজ লজিক
        function closeEditModal() {
            document.getElementById('iosModalOverlay').style.display = 'none';
            currentEditingEmail = null;
        }

        // 💾 এডিট করা ডাটা সেভ করার মেইন লজিক
        function saveAccountEdits() {
            if (!currentEditingEmail) return;

            const newRecovery = document.getElementById('modalRecoveryInput').value.trim();
            const new2fa = document.getElementById('modal2faInput').value.trim();

            // গ্লোবাল অ্যারে আপডেট করা
            allOrdersGlobal = allOrdersGlobal.map(item => {
                let currentMail = (item.email || item.gmail || '').trim().toLowerCase();
                if (currentMail === currentEditingEmail.trim().toLowerCase()) {
                    return {
                        ...item,
                        recovery: newRecovery || 'N/A',
                        '2fa': new2fa
                    };
                }
                return item;
            });

            // স্ক্রিন রিফ্রেশ/আপডেট
            const activeQuery = document.getElementById('searchInput').value.trim().toLowerCase();
            if (activeQuery === "") {
                renderOrders(allOrdersGlobal);
            } else {
                const filtered = allOrdersGlobal.filter(item => {
                    let emailVal = (item.email || item.gmail || '').trim().toLowerCase();
                    return emailVal === activeQuery; 
                });
                renderOrders(filtered);
            }

            closeEditModal();
            triggerNotification("Account Updated Successfully!", 'success');

            // 🤖 বোটের ডাটাবেজ আপডেট এর সংকেত পাঠানো
            if (window.Telegram && window.Telegram.WebApp) {
                try {
                    window.Telegram.WebApp.sendData(JSON.stringify({
                        action: "edit_account",
                        email: currentEditingEmail,
                        recovery: newRecovery,
                        tfa: new2fa
                    }));
                } catch(tgErr) { console.log("Bot Sync Failed:", tgErr); }
            }
        }

        // 🗑️ অ্যাকাউন্ট ডিলিট করার ফাংশন
        function executeDeleteAccount(targetEmail) {
            if (!targetEmail || targetEmail === 'N/A') return;

            if (confirm(`Are you sure you want to delete this account?\n\n${targetEmail}`)) {
                allOrdersGlobal = allOrdersGlobal.filter(item => {
                    let currentMail = (item.email || item.gmail || '').trim().toLowerCase();
                    return currentMail !== targetEmail.trim().toLowerCase();
                });

                const activeQuery = document.getElementById('searchInput').value.trim().toLowerCase();
                if (activeQuery === "") {
                    renderOrders(allOrdersGlobal);
                } else {
                    const filtered = allOrdersGlobal.filter(item => {
                        let emailVal = (item.email || item.gmail || '').trim().toLowerCase();
                        return emailVal === activeQuery; 
                    });
                    renderOrders(filtered);
                }

                triggerNotification("Account Deleted Successfully!", 'danger');

                if (window.Telegram && window.Telegram.WebApp) {
                    try {
                        window.Telegram.WebApp.sendData(JSON.stringify({
                            action: "delete_account",
                            email: targetEmail
                        }));
                    } catch(tgErr) { console.log(tgErr); }
                }
            }
        }

        // এইচটিএমএল কার্ড রেন্ডার ফাংশน
        function renderOrders(ordersList) {
            const historyBox = document.getElementById('historyBox');
            
            if(!ordersList || !Array.isArray(ordersList) || ordersList.length === 0) {

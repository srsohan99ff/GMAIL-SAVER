<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GMAIL SAVER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsSHA/2.4.2/sha.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f2f2f7;          
            --card: #ffffff;        
            --border: #e5e5ea;      
            --text: #000000;        
            --muted: #8e8e93;       
            --success: #34c759;     
            --danger: #ff3b30;    
            --primary: #007aff;     
            --font: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body { 
            background-color: var(--bg); 
            padding: 20px 14px; 
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .page-title {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }
        
        /* 👑 উপর থেকে নেমে আসা প্রিমিয়াম iOS সাকসেস নোটিফিকেশন */
        #topNotification {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff; 
            padding: 10px 22px; border-radius: 50px; font-size: 13px; font-weight: 600;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2); z-index: 10000; 
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            display: flex; align-items: center; gap: 10px; white-space: nowrap; pointer-events: none;
        }
        #topNotification.show { top: 20px; }
        .toast-check { width: 18px; height: 18px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; color: #fff; }
        .toast-check svg { width: 11px; height: 11px; stroke: #fff; fill: none; stroke-width: 3; }

        /* 👑 প্রিমিয়াম হোয়াইট কার্ড স্টাইল */
        .card { 
            background: var(--card); border-radius: 14px; overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.03); box-shadow: 0 2px 6px rgba(0,0,0,0.02); 
            margin-bottom: 16px; padding: 2px 0;
        }
        .summary-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 14px; border-bottom: 1px solid #f2f2f7; gap: 10px;
        }
        .summary-row:last-child { border-bottom: none; }
        
        .row-label { font-size: 13px; color: #48484a; font-weight: 700; white-space: nowrap; }
        .row-value-copy { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text); justify-content: flex-end; max-width: 75%; }
        .value-text { font-family: monospace; color: var(--text); word-break: break-all; text-align: right; user-select: text; }

        /* 👑 গোলাকৃতির কাস্টম কপি বাটন */
        .inline-copy-btn {
            width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
            background: #ffffff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease; flex-shrink: 0;
        }
        .inline-copy-btn svg { width: 12px; height: 12px; fill: var(--muted); }
        .inline-copy-btn:active { transform: scale(0.88); background: #f2f2f7; }
        .inline-copy-btn.copied { background: var(--success) !important; border-color: var(--success) !important; }
        .inline-copy-btn.copied svg { fill: #fff !important; }
        
        .message-box { text-align: center; color: var(--muted); font-weight: 600; padding: 60px 20px; font-size: 15px; }

        /* 👑 অ্যাকাউন্ট কাউন্টার স্টাইল */
        .counter-container {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; color: var(--muted); font-weight: 600; margin-bottom: 16px; padding: 0 4px;
        }
        .counter-value {
            color: var(--primary); font-weight: 700; background: rgba(0, 122, 255, 0.1);
            padding: 3px 10px; border-radius: 20px; font-size: 13px;
        }

        /* 🔑 ২এফএ ডাইনামিক লাইভ টেক্সট কন্টেন্ট */
        .otp-display { font-family: monospace; color: var(--primary); font-weight: 800; font-size: 17px; letter-spacing: 0.5px; }
        .otp-controls-hub { display: flex; align-items: center; gap: 8px; }
        
        /* ⏱️ ৩০ সেকেন্ডের রানিং সার্কেল টাইমার */
        .authenticator-timer-box {
            display: flex; align-items: center; justify-content: center; position: relative; width: 24px; height: 24px; flex-shrink: 0;
        }
        .authenticator-timer-box svg { transform: rotate(-90deg); width: 24px; height: 24px; }
        .authenticator-timer-box circle { fill: none; stroke-width: 2.5; }
        .authenticator-timer-box .bg-ring { stroke: #e5e5ea; }
        .authenticator-timer-box .progress-ring {
            stroke: var(--primary); stroke-dasharray: 62.8; stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
        }
        .timer-text-sec { position: absolute; font-size: 8px; font-weight: 700; color: var(--primary); font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="topNotification">
        <div class="toast-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        Copied Successfully!
    </div>

    <h2 class="page-title">GMAIL SAVER</h2>

    <div class="counter-container">
        <span>Total Accounts:</span>
        <span id="totalCount" class="counter-value">0</span>
    </div>

    <div id="historyBox" class="message-box">Loading accounts...</div>

    <script>
        let allOrdersGlobal = [];
        let live2FAEngineTimer = null;

        // ২এফএ বেস-৩২ ডিকোড হেল্পার লজিক
        function dec2hex(s) { return (s < 15.5 ? '0' : '') + Math.round(s).toString(16); }
        function hex2dec(s) { return parseInt(s, 16); }
        function base32tohex(base32) {
            let base32chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
            let bits = ""; let hex = "";
            for (let i = 0; i < base32.length; i++) {
                let val = base32chars.indexOf(base32.charAt(i).toUpperCase());
                if(val === -1) continue;
                bits += leftpad(val.toString(2), 5, '0');
            }
            for (let i = 0; i + 4 <= bits.length; i += 4) {
                let chunk = bits.substr(i, 4);
                hex = hex + parseInt(chunk, 2).toString(16);
            }
            return hex;
        }
        function leftpad(str, len, pad) { if (len + 1 >= str.length) { str = Array(len + 1 - str.length).join(pad) + str; } return str; }

        // লাইভ TOTP বা ২এফএ ওটিপি জেনারেট করার কোর ফাংশন
        function getLocalTOTP(secret) {
            try {
                if(!secret || secret.trim() === "") return "------";
                let key = base32tohex(secret.toUpperCase().replace(/\s+/g, ""));
                let epoch = Math.round(new Date().getTime() / 1000.0);
                let time = leftpad(dec2hex(Math.floor(epoch / 30)), 16, '0');
                
                let shaObj = new jsSHA("SHA-1", "HEX");
                shaObj.setHMACKey(key, "HEX");
                shaObj.update(time);
                let hmac = shaObj.getHMAC("HEX");
                
                let offset = hex2dec(hmac.substring(hmac.length - 1));
                let otp = (hex2dec(hmac.substr(offset * 2, 8)) & hex2dec('7fffffff')) + '';
                otp = otp.substr(otp.length - 6, 6);
                return leftpad(otp, 6, '0');
            } catch (err) {
                return "000000";
            }
        }

        // কপি বাটন ক্লিক অ্যানিমেশন ও ক্লيبবোর্ড ম্যানেজমেন্ট
        function copyOrder(text, btnId) {
            if(!text || text.includes("---") || text.includes("Calculat")) return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById(btnId);
                const icon = btn.querySelector('svg');
                const notif = document.getElementById('topNotification');
                
                btn.classList.add('copied');
                icon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#ffffff"/>';
                notif.classList.add('show');
                
                setTimeout(function() {
                    notif.classList.remove('show'); 
                    btn.classList.remove('copied');
                    icon.innerHTML = '<path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="#8e8e93"/>';
                }, 2200);
            });
        }

        // ⏱️ লাইভ ৩০ সেকেন্ড কাউন্টডাউন এবং সার্কেল প্রগ্রেস রিং ইঞ্জিন
        function startLive2FAEngine() {
            if(live2FAEngineTimer) clearInterval(live2FAEngineTimer);

            const totalRadius = 10;
            const circumference = 2 * Math.PI * totalRadius; 

            function updateLoop() {
                const now = new Date();
                const currentSeconds = now.getSeconds();
                const remainingTime = 30 - (currentSeconds % 30);

                document.querySelectorAll('.card').forEach((card) => {
                    const secret = card.getAttribute('data-tfa-secret');
                    const otpSpan = card.querySelector('.otp-display');
                    const ring = card.querySelector('.progress-ring');
                    const textSec = card.querySelector('.timer-text-sec');
                    const copyBtn = card.querySelector('.tfa-live-copy-btn');

                    if (!secret || secret.trim() === "" || secret.toLowerCase() === "n/a") return;

                    // প্রতি সেকেন্ডে রিয়েল-টাইম ওটিপি জেনারেট
                    const currentLiveCode = getLocalTOTP(secret);
                    if(otpSpan) otpSpan.innerText = currentLiveCode;

                    // ২এফএ বাটনের কপি রানটাইম ভ্যালু সিঙ্ক
                    if(copyBtn) {
                        copyBtn.setAttribute('onclick', `copyOrder('${currentLiveCode}', '${copyBtn.id}')`);
                    }

                    // ৩০ সেকেন্ডের কালার রিং অ্যানিমেশন চেইঞ্জ
                    if(textSec) textSec.innerText = remainingTime;
                    
                    if(ring && textSec) {
                        if(remainingTime <= 5) {
                            ring.style.stroke = "var(--danger)";
                            textSec.style.color = "var(--danger)";
                        } else {
                            ring.style.stroke = "var(--primary)";
                            textSec.style.color = "var(--primary)";
                        }
                        const offsetValue = circumference - (remainingTime / 30) * circumference;
                        ring.style.strokeDashoffset = offsetValue;
                    }
                });
            }

            updateLoop();
            live2FAEngineTimer = setInterval(updateLoop, 1000);
        }

        // এইচটিএমএল কার্ড রেন্ডার ফাংশন
        function renderOrders(ordersList) {
            const historyBox = document.getElementById('historyBox');
            
            if(!ordersList || !Array.isArray(ordersList) || ordersList.length === 0) {
                document.getElementById('totalCount').innerText = "0";
                historyBox.innerHTML = "No accounts found.";
                historyBox.classList.add('message-box');
                return;
            }

            document.getElementById('totalCount').innerText = ordersList.length;

            historyBox.innerHTML = ordersList.map((item, index) => {
                let btnIdEmail = 'btn-email-' + index;
                let btnIdPass = 'btn-pass-' + index;
                let btnIdRec = 'btn-rec-' + index;
                let btnIdSecret = 'btn-secret-' + index;
                let btnIdLiveOtp = 'btn-live-' + index;
                
                // 🎯 স্ক্রিনশটের কি (Keys) অনুযায়ী সেফ ব্র্যাকেট নোটেশন ম্যাপিং
                let emailVal = item.email || item.gmail || 'N/A';
                let passVal = item.password || 'N/A';
                let recoveryVal = item.recovery || 'N/A';
                let tfaSecretVal = item['2fa'] || ''; 

                return `
                <div class="card" data-tfa-secret="${tfaSecretVal}">
                    <div class="summary-row">
                        <span class="row-label">Email</span>
                        <div class="row-value-copy">
                            <span class="value-text">${emailVal}</span>
                            <button class="inline-copy-btn" id="${btnIdEmail}" onclick="copyOrder('${emailVal}', '${btnIdEmail}')" aria-label="Copy Email">
                                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="summary-row">
                        <span class="row-label">Password</span>
                        <div class="row-value-copy">
                            <span class="value-text">${passVal}</span>
                            <button class="inline-copy-btn" id="${btnIdPass}" onclick="copyOrder('${passVal}', '${btnIdPass}')" aria-label="Copy Password">
                                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="summary-row">
                        <span class="row-label">Recovery Mail</span>
                        <div class="row-value-copy">
                            <span class="value-text">${recoveryVal}</span>
                            <button class="inline-copy-btn" id="${btnIdRec}" onclick="copyOrder('${recoveryVal}', '${btnIdRec}')" aria-label="Copy Recovery Mail">
                                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="summary-row">
                        <span class="row-label">2FA Secret Key</span>
                        <div class="row-value-copy">
                            <span class="value-text" style="font-weight:700; font-size:12px; color: var(--muted);">${tfaSecretVal || 'N/A'}</span>
                            <button class="inline-copy-btn" id="${btnIdSecret}" onclick="copyOrder('${tfaSecretVal}', '${btnIdSecret}')" aria-label="Copy Secret Key">
                                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="summary-row" style="background: rgba(0,122,255,0.02); border-top: 1px dashed #e5e5ea;">
                        <span class="row-label" style="color: var(--primary); font-weight: 800;">Live 2FA OTP</span>
                        <div class="row-value-copy">
                            <div class="otp-controls-hub">
                                <div class="authenticator-timer-box">
                                    <svg>
                                        <circle class="bg-ring" cx="12" cy="12" r="10"></circle>
                                        <circle class="progress-ring" cx="12" cy="12" r="10"></circle>
                                    </svg>
                                    <span class="timer-text-sec">30</span>
                                </div>
                                <span class="otp-display">Calculating...</span>
                            </div>
                            <button class="inline-copy-btn tfa-live-copy-btn" id="${btnIdLiveOtp}" onclick="" aria-label="Copy Live OTP">
                                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            historyBox.classList.remove('message-box');
            startLive2FAEngine();
        }

        // 🛡️ সম্পূর্ণ গ্লোবাল সেফটি রান-টাইম লোডার (DOMContentLoaded)
        document.addEventListener('DOMContentLoaded', function () {
            const historyBox = document.getElementById('historyBox');
            
            try {
                // স্মার্ট ইউআরএল চেকিং (Search Query এবং Hash একসাথেই স্ক্যান করবে)
                const searchString = window.location.search || window.location.hash.replace('#', '?');
                const urlParams = new URLSearchParams(searchString);
                const historyData = urlParams.get('data') || urlParams.get('orders'); 

                if (historyData) {
                    const decodedData = decodeURIComponent(historyData);
                    allOrdersGlobal = JSON.parse(decodedData);
                    renderOrders(allOrdersGlobal);
                } else {
                    // কোনো ডাটা ইউআরএল-এ না থাকলে সরাসরি ফলব্যাক মেসেজ
                    document.getElementById('totalCount').innerText = "0";
                    historyBox.innerHTML = "No accounts found.";
                    historyBox.classList.add('message-box');
                }
            } catch (error) {
                // স্ক্রিপ্ট লেভেলে যেকোনো ক্র্যাশ হ্যান্ডল করে নো অ্যাকাউন্ট দেখাবে
                document.getElementById('totalCount').innerText = "0";
                historyBox.innerHTML = "No accounts found.";
                historyBox.classList.add('message-box');
            }

            // টেলিগ্রাম কাস্টম ইনিশিয়েশন চেক
            if (window.Telegram && window.Telegram.WebApp) {
                try {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                } catch(tgErr) { console.log(tgErr); }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Premium Telegram WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- iOS Base & Premium Theme Styling --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* iOS ডার্ক ব্যাকগ্রাউন্ড */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .ios-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* iOS Premium Card */
        .ios-card {
            background: #1c1c1e;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #aeaeae;
        }

        /* iOS Input Fields */
        .ios-input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .ios-label {
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 6px;
            display: block;
            padding-left: 4px;
        }

        .ios-input {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            color: #ffffff;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
        }

        .ios-input:focus {
            border-color: #007aff; /* আইফোন ব্লু ফোকাস */
        }

        /* ইমেইল ভুল হলে শুধু বক্সটি লাল হবে (কোনো ক্রস চিহ্ন থাকবে না) */
        .ios-input.input-error {
            border-color: #ff3b30 !important; /* iOS লাল বর্ডার */
            background-color: rgba(255, 59, 48, 0.05); /* হালকা লাল আবহ */
            box-shadow: 0 0 8px rgba(255, 59, 48, 0.3);
        }

        /* iOS Buttons */
        .ios-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
        }

        .ios-btn:active {
            opacity: 0.7;
        }

        .ios-btn-primary {
            background: #007aff;
            color: white;
            margin-bottom: 12px;
        }

        .ios-btn-danger {
            background: #ff3b30;
            color: white;
        }

        /* --- iOS PIN Modal Styling (আইফোন লক স্ক্রিন) --- */
        .ios-pin-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(30px); /* আইফোনের মতো ফ্রস্টেড গ্লাস ব্লার */
            -webkit-backdrop-filter: blur(30px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #ffffff;
        }

        .ios-pin-container {
            text-align: center;
            width: 100%;
            max-width: 320px;
            padding: 20px;
        }

        .pin-header {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
        }

        /* ৬টি ডট */
        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 55px;
        }

        .dot {
            width: 13px;
            height: 13px;
            border: 1.5px solid #ffffff;
            border-radius: 50%;
            transition: background 0.15s ease-in-out;
        }

        .dot.filled {
            background: #ffffff;
        }

        /* কিপ্যাড গ্রিড */
        .pin-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px 28px;
            justify-items: center;
            margin-bottom: 40px;
        }

        /* গোল বাটন */
        .key {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            font-size: 32px;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.1s;
        }

        .key:active {
            background: rgba(255, 255, 255, 0.35);
        }

        .key.empty {
            background: transparent;
            cursor: default;
        }

        .key.delete-btn {
            background: transparent;
            font-size: 22px;
        }

        .key.delete-btn:active {
            background: transparent;
            opacity: 0.5;
        }

        .pin-cancel {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 400;
            cursor: pointer;
            opacity: 0.8;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="ios-container">
        <div class="ios-card">
            <div class="card-title">প্রোফাইল এডিট করুন</div>
            
            <div class="ios-input-group">
                <label class="ios-label">আপনার জিমেইল এড্রেস</label>
                <input type="email" id="email-input" class="ios-input" placeholder="example@gmail.com" oninput="validateEmail()">
            </div>
            
            <button class="ios-btn ios-btn-primary" onclick="saveData()">তথ্য সেভ করুন</button>
        </div>

        <div class="ios-card">
            <div class="card-title">অ্যাকাউন্ট অ্যাকশন</div>
            <button class="ios-btn ios-btn-danger" onclick="openPinModal()">Delete Account</button>
        </div>
    </div>

    <div id="pin-modal" class="ios-pin-modal hidden">
        <div class="ios-pin-container">
            <div class="pin-header">সিকিউরিটি পিন লিখুন</div>
            
            <div class="pin-dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            
            <div class="pin-keypad">
                <button class="key" onclick="pressKey(1)">1</button>
                <button class="key" onclick="pressKey(2)">2</button>
                <button class="key" onclick="pressKey(3)">3</button>
                <button class="key" onclick="pressKey(4)">4</button>
                <button class="key" onclick="pressKey(5)">5</button>
                <button class="key" onclick="pressKey(6)">6</button>
                <button class="key" onclick="pressKey(7)">7</button>
                <button class="key" onclick="pressKey(8)">8</button>
                <button class="key" onclick="pressKey(9)">9</button>
                
                <div class="key empty"></div> 
                <button class="key" onclick="pressKey(0)">0</button>
                <button class="key delete-btn" onclick="pressDelete()">⌫</button>
            </div>
            
            <button class="pin-cancel" onclick="closePinModal()">বাতিল করুন</button>
        </div>
    </div>

    <script>
        // টেলিগ্রাম ওয়েব অ্যাপ ইনিশিয়ালাইজেশন
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // অ্যাপটি ফুল স্ক্রিন করার জন্য
        }

        /* --- ১. ইমেইল চেকিং লজিক (ক্রস চিহ্ন ছাড়া শুধু লাল বক্স) --- */
        function validateEmail() {
            const emailInput = document.getElementById('email-input');
            const emailValue = emailInput.value.trim();
            
            // ইমেইলের শেষে যদি @gmail.com না থাকে তবে বক্সটি লাল হবে
            if (emailValue !== "" && !emailValue.endsWith('@gmail.com')) {
                emailInput.classList.add('input-error');
            } else {
                // সঠিক হলে বা খালি থাকলে লাল বর্ডার চলে যাবে
                emailInput.classList.remove('input-error');
            }
        }

        function saveData() {
            const emailInput = document.getElementById('email-input');
            if (emailInput.classList.contains('input-error') || emailInput.value.trim() === "") {
                if (window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                }
                alert('অনুগ্রহ করে সঠিক জিমেইল এড্রেস দিন!');
            } else {
                alert('তথ্য সফলভাবে সেভ হয়েছে!');
            }
        }


        /* --- ২. ৬ ডিজিট প্রিমিয়াম মাস্টার পিন লজিক --- */
        let currentPin = "";
        const correctPin = "123456"; // আপনার ডাটাবেজ বা ব্যাকএন্ডের পিন কোডটি এখানে ম্যাচ করবেন

        function openPinModal() {
            currentPin = "";
            updateDots();
            document.getElementById('pin-modal').classList.remove('hidden');
        }

        function closePinModal() {
            document.getElementById('pin-modal').classList.add('hidden');
        }

        function pressKey(num) {
            if (currentPin.length < 6) {
                currentPin += num;
                updateDots();
                
                // Telegram Light Haptic Feedback (টাইপিং ভাইব্রেশন)
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                }

                // ৬ ডিজিট পূরণ হলে অটোমেটিক ভেরিফাই হবে
                if (currentPin.length === 6) {
                    setTimeout(verifyPin, 250); 
                }
            }
        }

        function pressDelete() {
            if (currentPin.length > 0) {
                currentPin = currentPin.slice(0, -1);
                updateDots();
                
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                }
            }
        }

        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                if (index < currentPin.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        function verifyPin() {
            if (currentPin === correctPin) {
                // সঠিক পিন হলে Success Vibration দেবে
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }
                
                alert('পিন সঠিক হয়েছে! অ্যাকাউন্টটি চিরতরে ডিলিট করা হচ্ছে...');
                closePinModal();
                
                // এখানে আপনার অ্যাকাউন্ট ডিলিট করার ব্যাকএন্ড বা এপিআই কল করতে পারেন।
                
            } else {
                // ভুল পিন হলে Error Vibration দেবে
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                }
                
                alert('ভুল সিকিউরিটি পিন! আবার চেষ্টা করুন।');
                currentPin = "";
                updateDots();
            }
        }
    </script>
</body>
</html>
